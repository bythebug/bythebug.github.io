---
layout: default
title: Blog
---

<div class="blog-listing-header">
  <h1>Writing</h1>
  <p>Thoughts on backend engineering, AI, startups, and building software.</p>
</div>

<div class="blog-post-list">
  {% for post in site.posts %}
  <a href="{{ site.baseurl }}{{ post.url }}" class="blog-post-item">
    <span class="blog-post-date">{{ post.date | date: "%B %d, %Y" }}</span>
    <h2 class="blog-post-title">{{ post.title }}</h2>
    <p class="blog-post-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
    <span class="blog-read-more">Read more →</span>
  </a>
  {% endfor %}
</div>
